name: Denní aktualizace CSV

on:
  schedule:
    - cron: "0 5 * * *"   # Každý den v 5:00 UTC = 6:00 Praha (letní čas)
  workflow_dispatch:       # Umožní i ruční spuštění přes GitHub UI

jobs:
  aktualizace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalace závislostí
        run: pip install pytz

      - name: Spuštění skriptu
        run: python update_csv.py

      - name: Commit a push aktualizovaného CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Impulsy_ORCA.csv
          git diff --cached --quiet || git commit -m "Auto-aktualizace CSV $(date +'%Y-%m-%d')"
          git push
